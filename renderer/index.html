<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Terminal</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- xterm.js from CDN (bundled via npm in production) -->
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
</head>
<body>

  <!-- ── Top bar ───────────────────────────────────────────────────────── -->
  <div id="titlebar">
    <div id="titlebar-left">
      <div id="app-icon">⚡</div>
      <span id="app-title">Claude Terminal</span>
      <button id="btn-pick-folder" title="Change working folder (Ctrl+Shift+O)">📁</button>
      <span id="cwd-display" title="Current working directory"></span>
    </div>
    <div id="titlebar-right">
      <select id="shell-select" title="Shell">
        <option value="auto">Auto (Git Bash / PowerShell)</option>
        <option value="powershell">PowerShell</option>
        <option value="cmd">CMD</option>
      </select>
      <button id="btn-restart" title="Restart terminal (Ctrl+Shift+R)">↺ Restart</button>
    </div>
  </div>

  <!-- ── Session startup panel ───────────────────────────────────────── -->
  <div id="session-panel">
    <div id="session-panel-inner">
      <div id="session-logo">⚡</div>
      <h2>Start Claude</h2>
      <p>How would you like to begin?</p>
      <div id="session-buttons">
        <button class="session-opt" id="sess-new" data-mode="new">
          <span class="session-opt-icon">✦</span>
          <span class="session-opt-label">New session</span>
          <span class="session-opt-sub">Start fresh</span>
        </button>
        <button class="session-opt" id="sess-continue" data-mode="continue">
          <span class="session-opt-icon">↩</span>
          <span class="session-opt-label">Resume last</span>
          <span class="session-opt-sub">Continue most recent</span>
        </button>
        <button class="session-opt" id="sess-resume" data-mode="resume">
          <span class="session-opt-icon">☰</span>
          <span class="session-opt-label">Pick session</span>
          <span class="session-opt-sub">Choose from history</span>
        </button>
      </div>
      <p class="session-hint">1 · 2 · 3 to choose with keyboard</p>
    </div>
  </div>

  <!-- ── Terminal ──────────────────────────────────────────────────────── -->
  <div id="terminal-container">
    <div id="terminal"></div>

    <!-- Image preview — floats over the terminal bottom-left -->
    <div id="img-preview" class="hidden">
      <img id="img-preview-thumb" src="" alt="pasted image" />
      <div id="img-preview-info">
        <span id="img-preview-path"></span>
        <span id="img-preview-hint">Path inserted ↵</span>
      </div>
      <button id="img-preview-close" title="Dismiss">✕</button>
    </div>
  </div>

  <!-- ── Claude action bar ─────────────────────────────────────────────── -->
  <div id="action-bar">
    <div id="action-bar-left">
      <span id="claude-status" class="status-idle">● Claude</span>
      <span id="prompt-hint"></span>
    </div>
    <div id="action-bar-right">
      <!-- STT controls -->
      <div id="stt-group">
        <button class="action-btn stt-off" id="btn-stt" title="Toggle speech-to-text (Ctrl+Shift+T)">
          🎤 STT
        </button>
        <select id="stt-lang" title="Recognition language">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="fr-FR">Français</option>
          <option value="de-DE">Deutsch</option>
          <option value="es-ES">Español</option>
          <option value="it-IT">Italiano</option>
          <option value="pt-PT">Português</option>
          <option value="nl-NL">Nederlands</option>
          <option value="ja-JP">日本語</option>
          <option value="zh-CN">中文 (简体)</option>
          <option value="ar-SA">العربية</option>
        </select>
        <span id="stt-interim" title="Interim speech result"></span>
      </div>

      <!-- Always-available shortcuts -->
      <button class="action-btn secondary" id="btn-escape" title="Send Escape (cancel)">
        Esc <kbd>Ctrl+[</kbd>
      </button>

      <!-- Claude approval buttons — shown when a yes/no is detected -->
      <div id="approval-group" class="hidden">
        <button class="action-btn danger" id="btn-refuse" title="Refuse (Ctrl+Shift+N)">
          ✗ No <kbd>Ctrl+Shift+N</kbd>
        </button>
        <button class="action-btn session" id="btn-session" title="Yes, don't ask again this session (Ctrl+Shift+S)">
          ↻ Yes, session <kbd>Ctrl+Shift+S</kbd>
        </button>
        <button class="action-btn success" id="btn-accept" title="Accept once (Ctrl+Shift+Y)">
          ✓ Yes <kbd>Ctrl+Shift+Y</kbd>
        </button>
      </div>

      <!-- Free-text quick send -->
      <button class="action-btn secondary" id="btn-send-yes"  title="Send 'y'">y</button>
      <button class="action-btn secondary" id="btn-send-no"   title="Send 'n'">n</button>
      <button class="action-btn secondary" id="btn-send-enter" title="Send Enter">⏎</button>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
